[build]
  command = "npm run build"
  publish = "dist"

[env]
  VITE_BACKEND_URL = "https://5g-backend-XXXX.onrender.com"

[[redirects]]
  from = "/stream"
  to = ":splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[context.production]
  command = "npm run build"
  publish = "dist"

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
